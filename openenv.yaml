# filepath: openenv.yaml
spec_version: "1.0"

environment_name: "Institutional_LOB_Execution"

description: |
  A high-fidelity Limit Order Book (LOB) simulator designed for institutional 
  trade execution research. Features an O(log N) Price-Time Priority matching 
  engine, multi-agent liquidity dynamics (Market Makers, Noise Traders), and 
  stochastic toxic flow. Evaluates agents on Implementation Shortfall (IS) 
  against a TWAP benchmark.

tasks:
  - id: "easy"
    description: "Liquid market with stable price action. Ideal for baseline execution testing."
    config:
      num_background_agents: 2
      market_volatility: 0.05
      max_steps: 100
      inventory_to_liquidate: 500
      
  - id: "medium"
    description: "Trending market with increased volatility and momentum-driven background flow."
    config:
      num_background_agents: 5
      market_volatility: 0.15
      max_steps: 150
      inventory_to_liquidate: 1000
      
  - id: "hard"
    description: "Flash-crash conditions with toxic flow and high adverse selection risk."
    config:
      num_background_agents: 10
      market_volatility: 0.35
      max_steps: 200
      inventory_to_liquidate: 2000
      toxic_flow_enabled: true

environment_config:
  symbol: "LOB-SIM"
  initial_price: 100.0
  tick_size: 0.01
  matching_engine: "price-time-priority"
  grading_metric: "implementation_shortfall"

# Metadata for OpenEnv Validator
version: "1.0.0"
license: "MIT"
tags: ["finance", "trading", "lob", "execution-optimization"]